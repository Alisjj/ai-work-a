services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: briefing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: briefings_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefing-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/briefings_db
      DEBUG: "false"
      API_KEY: ${API_KEY:-change-me-in-production}
      RATE_LIMIT_PER_MINUTE: "60"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro  # Mount app code for development
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Test Service (runs tests and exits)
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefing-test
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/briefings_test
      DEBUG: "true"
      API_KEY: test-api-key
      RATE_LIMIT_PER_MINUTE: "1000"
    depends_on:
      db-test:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python -m pytest tests/ -v --tb=short"

  # Test Database (for running tests)
  db-test:
    image: postgres:15-alpine
    container_name: briefing-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: briefings_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
